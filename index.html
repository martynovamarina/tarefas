<link rel="icon" type="image/png" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
:root{
  --cream:#FEF9F0;--cream2:#FDF4E3;
  --blue:#2B5BA8;--blue-light:#5B84CC;--blue-pale:#D6E4F7;
  --green:#2D7A4F;--green-light:#E8F5EE;
  --red:#C41230;--red-light:#FAE8EC;
  --gold:#D4A017;--caramel:#B07830;
  --ink:#1A1008;--muted:#8A7860;
  --card:white;--border:#EEE8D8;--bg:var(--cream);
}
[data-dark]{
  --cream:#18120A;--cream2:#201608;
  --blue:#5B84CC;--blue-light:#8AAAE0;--blue-pale:#1A2840;
  --green:#4AA870;--green-light:#0A2018;
  --red:#E84060;--red-light:#280810;
  --gold:#E8C040;--caramel:#D09840;
  --ink:#F0E8D8;--muted:#A09080;
  --card:#241808;--border:#382810;--bg:#18120A;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh;transition:background .3s,color .3s}

.header{position:relative;overflow:hidden;flex-shrink:0}
.sky{width:100%;height:130px;background:linear-gradient(180deg,#C8DCF0 0%,#DDE8F0 60%,#C0CCD4 100%);position:relative}
[data-dark] .sky{background:linear-gradient(180deg,#0A1828 0%,#101E30 60%,#0C1820 100%)}
.cloud{position:absolute;background:white;border-radius:50%;opacity:.82}
[data-dark] .cloud{background:#2A3848;opacity:.4}
.mountains-svg{position:absolute;bottom:0;left:0;width:100%;display:block}
.header-overlay{position:relative;z-index:3;padding:14px 18px 0;display:flex;align-items:flex-start;justify-content:space-between}
.date-line{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#2B4060;opacity:.8;margin-bottom:3px}
[data-dark] .date-line{color:#8AAAE0;opacity:1}
.app-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#1A2A40;line-height:1;text-shadow:0 1px 3px rgba(255,255,255,.6)}
[data-dark] .app-title{color:#C8DCF0;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.app-title em{font-style:italic;font-weight:300;font-size:20px;display:block;color:#2B5BA8;margin-top:1px}
[data-dark] .app-title em{color:#8AAAE0}
.rooster-wrap{flex-shrink:0;animation:bob 5s ease-in-out infinite;transform-origin:center bottom}
@keyframes bob{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.nata-row{display:flex;align-items:center;gap:3px;margin-top:8px;height:26px}
.nata{font-size:19px;filter:grayscale(1) opacity(.2);transition:all .4s cubic-bezier(.34,1.56,.64,1);line-height:1}
.nata.on{filter:none;animation:nataIn .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes nataIn{0%{transform:scale(.3) rotate(-15deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.dark-btn{position:absolute;top:10px;right:10px;z-index:10;background:rgba(255,255,255,.3);border:none;border-radius:20px;padding:4px 10px;font-size:14px;cursor:pointer;backdrop-filter:blur(4px)}
[data-dark] .dark-btn{background:rgba(0,0,0,.4)}

.azulejo-bar{height:18px;background:#2B5BA8;flex-shrink:0;overflow:hidden}
.waves{position:relative;height:42px;background:#4A9EC4;flex-shrink:0;overflow:hidden}
[data-dark] .waves{background:#0A3050}
.wave{position:absolute;bottom:0;left:0;width:200%;height:100%}
.wave.w1{animation:waveMove 5s linear infinite;opacity:.9}
.wave.w2{animation:waveMove 7s linear infinite reverse;opacity:.45}
@keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.waves-label{position:absolute;top:7px;left:18px;font-size:9px;color:rgba(255,255,255,.65);letter-spacing:.18em;text-transform:uppercase;font-weight:700;z-index:2}
.boat{position:absolute;top:5px;right:20px;font-size:18px;z-index:2;animation:bob 3s ease-in-out infinite}

.nata-bar{background:#2E1503;padding:10px 18px;display:flex;align-items:center;gap:5px;border-bottom:3px solid var(--caramel);flex-shrink:0}
[data-dark] .nata-bar{background:#180A00}
.nata-bar-label{font-size:9px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-right:2px;flex-shrink:0}
.natas{display:flex;gap:3px;flex:1}
.nata-count{font-size:10px;color:var(--gold);font-weight:700;flex-shrink:0}

.search-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.search-bar input{flex:1;border:none;background:var(--blue-pale);border-radius:20px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--ink);outline:none}
.search-bar input::placeholder{color:var(--muted)}
.search-clear{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:90px;background:var(--bg)}

.cat-chips{display:flex;gap:6px;padding:10px 18px;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border)}
.cat-chip{font-size:10px;font-weight:700;letter-spacing:.05em;border:none;border-radius:14px;padding:5px 12px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;opacity:.55}
.cat-chip.active{opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.15)}

.section-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:14px 18px 5px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.section-actions{display:flex;gap:6px;align-items:center}
.hide-done-btn{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:none;border:1px solid var(--blue-pale);border-radius:12px;padding:3px 10px;color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.hide-done-btn.active{background:var(--blue);color:white;border-color:var(--blue)}
.clear-done-btn{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:none;border:1px solid var(--red-light);border-radius:12px;padding:3px 10px;color:var(--red);cursor:pointer;font-family:'Nunito',sans-serif}

.add-row{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--card);border-bottom:1px solid var(--blue-pale);border-top:1px solid var(--blue-pale);margin-bottom:2px}
.add-row input{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:15px;color:var(--ink);outline:none}
.add-row input::placeholder{color:var(--muted)}
.add-btn{width:30px;height:30px;border:2px solid var(--blue);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:20px;line-height:1;transition:all .15s;flex-shrink:0}
.add-btn:hover{background:var(--blue);color:white}

.options-row{display:flex;align-items:center;gap:8px;padding:8px 18px 12px;background:var(--card);border-bottom:1px solid var(--blue-pale);margin-bottom:2px;flex-wrap:wrap}
.options-row label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.options-row input[type=date],.options-row select{border:1px solid var(--blue-pale);border-radius:8px;padding:4px 8px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);outline:none;background:var(--bg)}
.save-task-btn{margin-left:auto;background:var(--blue);color:white;border:none;border-radius:20px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer}

.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;background:var(--card);border-bottom:1px solid var(--border);transition:opacity .2s;animation:taskIn .2s ease;position:relative}
.task-item:nth-child(odd){background:var(--cream2)}
@keyframes taskIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.task-item.done{opacity:.4}
.check-box{width:22px;height:22px;border:2px solid var(--blue-light);border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-item.done .check-box{background:var(--caramel);border-color:var(--caramel)}
.check-mark{color:white;font-size:12px;font-weight:700;opacity:0;transition:.15s}
.task-item.done .check-mark{opacity:1}
.task-body{flex:1;min-width:0}
.task-text{font-size:15px;line-height:1.45;cursor:pointer;word-break:break-word}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-edit-input{width:100%;border:none;border-bottom:2px solid var(--blue);background:transparent;font-family:'Nunito',sans-serif;font-size:15px;color:var(--ink);outline:none;padding:2px 0}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.task-date{font-size:10px;color:var(--blue-light);font-weight:600}
.task-date.overdue{color:var(--red)}
.task-date.today-badge{background:var(--green-light);color:var(--green);padding:1px 7px;border-radius:10px;font-weight:700}
.task-cat-badge{font-size:9px;font-weight:700;border-radius:10px;padding:1px 7px;letter-spacing:.04em}
.task-repeat{font-size:9px;color:var(--muted);font-weight:600}
.schedule-btn{background:none;border:1px solid var(--blue-pale);border-radius:12px;padding:2px 8px;font-size:10px;color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700}
.task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px;line-height:1;transition:color .15s}
.edit-btn:hover{color:var(--blue)}
.del-btn{background:none;border:none;color:var(--border);cursor:pointer;font-size:18px;padding:2px;line-height:1;transition:color .15s}
.del-btn:hover{color:var(--red)}
.inline-picker{padding:8px 18px 12px 52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;animation:taskIn .15s ease}
.inline-picker input[type=date],.inline-picker select{border:1px solid var(--blue-pale);border-radius:8px;padding:5px 8px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);outline:none;background:var(--bg)}
.inline-picker button{background:var(--blue);color:white;border:none;border-radius:14px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.inline-picker .cancel-btn{background:var(--muted)}

/* STATS */
.stats-section{padding:16px 18px}
.stats-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--ink);margin-bottom:14px}
.stats-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.stats-card-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stats-number{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:var(--blue);line-height:1}
.stats-sub{font-size:12px;color:var(--muted);margin-top:4px}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:70px;margin-top:10px}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.week-bar{width:100%;border-radius:4px 4px 0 0;background:var(--blue-pale);transition:height .5s ease;min-height:3px}
.week-bar.today-bar{background:var(--blue)}
.week-bar-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.week-bar-count{font-size:10px;color:var(--blue);font-weight:700;min-height:14px}
.nata-week{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;font-size:18px}
.streak-wrap{display:flex;align-items:center;gap:14px}
.streak-num{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:600;color:var(--gold);line-height:1}
.streak-text{font-size:12px;color:var(--muted);line-height:1.5}
.cat-stats{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.cat-stat-row{display:flex;align-items:center;gap:10px}
.cat-stat-label{font-size:11px;font-weight:700;width:90px;flex-shrink:0;color:var(--ink)}
.cat-stat-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.cat-stat-bar{height:8px;border-radius:4px;transition:width .6s ease;min-width:3px}
.cat-stat-count{font-size:11px;color:var(--muted);font-weight:700;width:20px;text-align:right}

.empty-state{text-align:center;padding:48px 28px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
.empty-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px}

.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 20px rgba(43,91,168,.08)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:13px 2px 11px;background:none;border:none;cursor:pointer;color:var(--muted);transition:color .2s;font-family:'Nunito',sans-serif;position:relative}
.tab-icon{font-size:20px;line-height:1;transition:transform .2s}
.tab-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.tab-badge{position:absolute;top:7px;right:calc(50% - 18px);background:var(--red);color:white;font-size:8px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:15px;text-align:center}
.tab-btn.active{color:var(--blue)}
.tab-btn.active .tab-icon{transform:translateY(-3px)}
.copyright{text-align:center;padding:6px;font-size:10px;color:var(--muted);opacity:.5;font-family:'Nunito',sans-serif}
.hidden{display:none!important}
</style>
</head>

<div class="waves">
  <div class="waves-label">oceano atlântico</div>
  <div class="boat">⛵</div>
  <svg class="wave w1" viewBox="0 0 1600 42" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

    <path d="M0 30 Q80 14 160 30 Q240 46 320 30 Q400 14 480 30 Q560 46 640 30 Q720 14 800 30 Q880 46 960 30 Q1040 14 1120 30 Q1200 46 1280 30 Q1360 14 1440 30 Q1520 46 1600 30 L1600 42 L0 42Z" fill="white" opacity=".6"/>
  </svg>

<div class="nata-bar">
  <div class="nata-bar-label">hoje</div>
  <div class="natas" id="nataBarRow"></div>
  <div class="nata-count" id="nataCount">0/0</div>
</div>

<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="🔍 pesquisar tarefas…" oninput="onSearch()">
  <button class="search-clear hidden" id="searchClear" onclick="clearSearch()">×</button>
</div>

<div class="content" id="contentArea"></div>
<div class="copyright">© 2026 Marina Martynova · Tarefas de Portugal 🐓</div>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inbox',this)">
    <span class="tab-icon">📥</span><span class="tab-label">Entrada</span>
    <span class="tab-badge hidden" id="badge-inbox"></span>
  </button>
  <button class="tab-btn" onclick="switchTab('today',this)">
    <span class="tab-icon">☀️</span><span class="tab-label">Hoje</span>
    <span class="tab-badge hidden" id="badge-today"></span>
  </button>
  <button class="tab-btn" onclick="switchTab('upcoming',this)">
    <span class="tab-icon">📅</span><span class="tab-label">Em breve</span>
    <span class="tab-badge hidden" id="badge-upcoming"></span>
  </button>
  <button class="tab-btn" onclick="switchTab('stats',this)">
    <span class="tab-icon">📊</span><span class="tab-label">Stats</span>
  </button>
  <button class="tab-btn" onclick="switchTab('all',this)">
    <span class="tab-icon">🗂</span><span class="tab-label">Todas</span>
  </button>
</nav>

<script>
const CATS={
  none:   {label:'Todas',   color:'#8A7860',bg:'#F0EAD8'},
  life:   {label:'🌸 Vida',  color:'#C41230',bg:'#FAE8EC'},
  work:   {label:'💼 Trabalho',color:'#2B5BA8',bg:'#D6E4F7'},
  health: {label:'🏃 Saúde', color:'#2D7A4F',bg:'#E8F5EE'},
  home:   {label:'🏠 Casa',  color:'#B07830',bg:'#F5EDD6'},
  fun:    {label:'✨ Lazer', color:'#8B38C0',bg:'#EEE0FA'},
};
const REPEATS={none:'Não repete',daily:'Todos os dias',weekly:'Toda a semana',monthly:'Todo o mês'};

const VER='v6';
if(localStorage.getItem('tarefas-ver')!==VER){localStorage.removeItem('tarefas-v4');localStorage.setItem('tarefas-ver',VER);}
let tasks=JSON.parse(localStorage.getItem('tarefas-v4')||'[]');
let currentTab='inbox',schedulingId=null,editingId=null,addingTask=false,hideDone=false,filterCat='none',searchQ='';
let darkMode=localStorage.getItem('darkMode')==='1';

const TODAY=new Date();TODAY.setHours(0,0,0,0);
function todayStr(){return TODAY.toISOString().split('T')[0];}

if(darkMode){document.documentElement.setAttribute('data-dark','');document.getElementById('darkBtn').textContent='☀️';}
function toggleDark(){darkMode=!darkMode;darkMode?document.documentElement.setAttribute('data-dark',''):document.documentElement.removeAttribute('data-dark');localStorage.setItem('darkMode',darkMode?'1':'0');document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';}

function save(){localStorage.setItem('tarefas-v4',JSON.stringify(tasks));}

const days=['dom','seg','ter','qua','qui','sex','sáb'];
const daysFull=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
document.getElementById('dateEl').textContent=`${daysFull[TODAY.getDay()]}, ${TODAY.getDate()} de ${months[TODAY.getMonth()]}`;
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getDate()} ${months[d.getMonth()]}`;}

function nextDate(ds,rep){const d=new Date(ds+'T00:00:00');if(rep==='daily')d.setDate(d.getDate()+1);if(rep==='weekly')d.setDate(d.getDate()+7);if(rep==='monthly')d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0];}

function renderNatas(){
  const done=tasks.filter(t=>t.done&&(t.date===todayStr()||t.completedDate===todayStr())).length;
  const total=tasks.filter(t=>t.date===todayStr()||(t.done&&t.completedDate===todayStr())).length;
  const n=Math.min(done,8);
  ['nataRow','nataBarRow'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let i=0;i<8;i++){const s=document.createElement('span');s.className='nata'+(i<n?' on':'');s.textContent='🥧';el.appendChild(s);}});
  const nc=document.getElementById('nataCount');if(nc)nc.textContent=`${done}/${total}`;
}

function updateBadges(){
  setBadge('inbox',tasks.filter(t=>!t.date&&!t.done).length);
  setBadge('today',tasks.filter(t=>t.date===todayStr()&&!t.done).length);
  setBadge('upcoming',tasks.filter(t=>t.date&&t.date>todayStr()&&!t.done).length);
}
function setBadge(id,n){const el=document.getElementById('badge-'+id);if(!el)return;n>0?(el.textContent=n,el.classList.remove('hidden')):el.classList.add('hidden');}

function onSearch(){searchQ=document.getElementById('searchInput').value.toLowerCase();document.getElementById('searchClear').classList.toggle('hidden',!searchQ);renderContent();}
function clearSearch(){searchQ='';document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.add('hidden');renderContent();}

function switchTab(tab,btn){
  currentTab=tab;schedulingId=null;editingId=null;addingTask=false;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('searchBar').classList.toggle('hidden',tab==='stats');
  renderContent();
}

function renderStats(){
  const area=document.getElementById('contentArea');
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  const weekData=[];
  for(let i=6;i>=0;i--){const d=new Date(TODAY);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const c=tasks.filter(t=>t.done&&(t.completedDate===ds||(t.date===ds&&t.done))).length;weekData.push({label:days[d.getDay()],date:ds,count:c});}
  const maxW=Math.max(...weekData.map(d=>d.count),1);
  let streak=0;for(let i=0;i<30;i++){const d=new Date(TODAY);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];if(tasks.some(t=>t.done&&(t.completedDate===ds||(t.date===ds&&t.done))))streak++;else break;}
  const weekNatas=weekData.reduce((s,d)=>s+d.count,0);
  const catC={};Object.keys(CATS).filter(k=>k!=='none').forEach(k=>{catC[k]=tasks.filter(t=>t.cat===k).length;});
  const maxC=Math.max(...Object.values(catC),1);

  area.innerHTML=`<div class="stats-section">
  <div class="stats-title">Estatísticas ✨</div>
  <div class="stats-card">
    <div class="stats-card-title">Progresso geral</div>
    <div class="stats-number">${pct}%</div>
    <div class="stats-sub">${done} de ${total} tarefas concluídas</div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">Esta semana · pastéis de nata 🥧</div>
    <div class="nata-week">${'🥧'.repeat(Math.min(weekNatas,16))}</div>
    <div class="stats-sub" style="margin-top:6px">${weekNatas} tarefas concluídas</div>
    <div class="week-bars">${weekData.map(d=>`<div class="week-bar-wrap"><div class="week-bar-count">${d.count||''}</div><div class="week-bar${d.date===todayStr()?' today-bar':''}" style="height:${Math.max(d.count/maxW*55,3)}px"></div><div class="week-bar-label">${d.label}</div></div>`).join('')}</div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">Série consecutiva 🔥</div>
    <div class="streak-wrap"><div class="streak-num">${streak}</div><div class="streak-text">dias seguidos<br>com tarefas concluídas</div></div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">Por categoria</div>
    <div class="cat-stats">${Object.keys(CATS).filter(k=>k!=='none').map(k=>`<div class="cat-stat-row"><div class="cat-stat-label" style="color:${CATS[k].color}">${CATS[k].label}</div><div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:${catC[k]/maxC*100}%;background:${CATS[k].color}"></div></div><div class="cat-stat-count">${catC[k]}</div></div>`).join('')}</div>
  </div>
  </div>`;
  renderNatas();updateBadges();
}

function renderContent(){
  if(currentTab==='stats'){renderStats();return;}
  const area=document.getElementById('contentArea');
  let html='';

  // Cat chips
  html+=`<div class="cat-chips">`;
  Object.keys(CATS).forEach(k=>{const c=CATS[k];html+=`<button class="cat-chip${filterCat===k?' active':''}" style="background:${c.bg};color:${c.color}" onclick="setFilterCat('${k}')">${c.label}</button>`;});
  html+=`</div>`;

  // Add row
  const ph={inbox:'escreve e pressiona Enter…',today:'adicionar para hoje…',upcoming:'nova tarefa…',all:'nova tarefa…'};
  const addAct=currentTab==='inbox'?'addInboxTask()':'startAddTask()';
  html+=`<div class="add-row"><input type="text" id="taskInput" placeholder="${ph[currentTab]||'nova tarefa…'}" maxlength="140"><button class="add-btn" onclick="${addAct}">+</button></div>`;

  if(addingTask){
    const defDate=currentTab==='today'?todayStr():'';
    html+=`<div class="options-row">
      <label>📅</label><input type="date" id="newTaskDate" value="${defDate}" min="${todayStr()}">
      <label>🏷</label><select id="newTaskCat">${Object.keys(CATS).filter(k=>k!=='none').map(k=>`<option value="${k}">${CATS[k].label}</option>`).join('')}</select>
      <label>🔁</label><select id="newTaskRepeat">${Object.keys(REPEATS).map(k=>`<option value="${k}">${REPEATS[k]}</option>`).join('')}</select>
      <button class="save-task-btn" onclick="confirmAddTask()">Adicionar</button>
    </div>`;
  }

  let visible=[];let label='';
  if(currentTab==='inbox'){visible=tasks.filter(t=>!t.date);label='Entrada';}
  else if(currentTab==='today'){visible=tasks.filter(t=>t.date===todayStr());label='Hoje';}
  else if(currentTab==='upcoming'){visible=tasks.filter(t=>t.date&&t.date>todayStr());label='Em breve';}
  else{visible=[...tasks];label='Todas as tarefas';}
  if(filterCat!=='none')visible=visible.filter(t=>t.cat===filterCat);
  if(searchQ)visible=visible.filter(t=>t.text.toLowerCase().includes(searchQ));
  const doneCount=visible.filter(t=>t.done).length;

  html+=`<div class="section-label"><span>${label} · ${visible.length}</span><div class="section-actions">`;
  if(doneCount>0){
    html+=`<button class="hide-done-btn${hideDone?' active':''}" onclick="toggleHideDone()">${hideDone?'👁':'🙈'} ${hideDone?'mostrar':'ocultar'}</button>`;
    html+=`<button class="clear-done-btn" onclick="clearDone()">🗑 apagar</button>`;
  }
  html+=`</div></div>`;

  visible.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;if(a.date&&b.date)return a.date.localeCompare(b.date);if(a.date)return -1;if(b.date)return 1;return b.id-a.id;});
  if(hideDone)visible=visible.filter(t=>!t.done);

  if(!visible.length){
    const msgs={inbox:{icon:'📥',text:'Caixa vazia · escreve e pressiona Enter'},today:{icon:'☀️',text:'Tudo feito hoje · parabéns!'},upcoming:{icon:'🗓',text:'Sem tarefas futuras'},all:{icon:'🐓',text:'Sem tarefas'}};
    const e=msgs[currentTab]||msgs.all;
    html+=`<div class="empty-state"><div class="empty-icon">${e.icon}</div><div class="empty-text">${e.text}</div></div>`;
  } else {
    visible.forEach(t=>{
      const isS=schedulingId===t.id,isE=editingId===t.id;
      const cat=CATS[t.cat||'none']||CATS.none;
      let dateBadge='';
      if(t.date){if(t.date===todayStr())dateBadge=`<span class="task-date today-badge">hoje</span>`;else if(t.date<todayStr())dateBadge=`<span class="task-date overdue">⚠ ${fmtDate(t.date)}</span>`;else dateBadge=`<span class="task-date">${fmtDate(t.date)}</span>`;}
      const catBadge=t.cat&&t.cat!=='none'?`<span class="task-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>`:'';
      const repBadge=t.repeat&&t.repeat!=='none'?`<span class="task-repeat">🔁 ${REPEATS[t.repeat]}</span>`:'';
      const schedBtn=!t.date&&!t.done?`<button class="schedule-btn" onclick="startSchedule(${t.id})">📅 agendar</button>`:'';
      const bc=t.cat&&CATS[t.cat]?CATS[t.cat].color:'#5B84CC';

      html+=`<div class="task-item${t.done?' done':''}" id="task-${t.id}" style="border-left:3px solid ${bc}${t.done?'55':'99'}">
        <div class="check-box" onclick="toggleTask(${t.id})"><span class="check-mark">✓</span></div>
        <div class="task-body">
          ${isE?`<input class="task-edit-input" id="edit-${t.id}" value="${t.text.replace(/"/g,'&quot;')}" onkeydown="handleEditKey(event,${t.id})">`:`<div class="task-text" ondblclick="startEdit(${t.id})">${t.text}</div>`}
          <div class="task-meta">${dateBadge}${catBadge}${repBadge}${schedBtn}</div>
        </div>
        <div class="task-actions">
          ${isE?`<button class="edit-btn" onclick="saveEdit(${t.id})">✓</button>`:`<button class="edit-btn" onclick="startEdit(${t.id})">✏️</button>`}
          <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
        </div>
      </div>`;

      if(isS){html+=`<div class="inline-picker">
        <input type="date" id="sched-date-${t.id}" value="${todayStr()}" min="${todayStr()}">
        <select id="sched-cat-${t.id}">${Object.keys(CATS).filter(k=>k!=='none').map(k=>`<option value="${k}"${t.cat===k?' selected':''}>${CATS[k].label}</option>`).join('')}</select>
        <select id="sched-rep-${t.id}">${Object.keys(REPEATS).map(k=>`<option value="${k}"${t.repeat===k?' selected':''}>${REPEATS[k]}</option>`).join('')}</select>
        <button onclick="applySchedule(${t.id})">✓ ok</button>
        <button class="cancel-btn" onclick="schedulingId=null;renderContent()">×</button>
      </div>`;}
    });
  }

  area.innerHTML=html;
  if(editingId){const i=document.getElementById(`edit-${editingId}`);if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
  const inp=document.getElementById('taskInput');
  if(inp)inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){const text=inp.value.trim();if(!text)return;
      if(currentTab==='inbox'&&!addingTask){tasks.unshift({id:Date.now(),text,done:false,date:'',cat:'none',repeat:'none'});inp.value='';save();renderContent();return;}
      if(addingTask)confirmAddTask();else startAddTask();}
  });
  renderNatas();updateBadges();
}

function setFilterCat(c){filterCat=c;renderContent();}
function toggleHideDone(){hideDone=!hideDone;renderContent();}
function clearDone(){
  let d=[];
  if(currentTab==='inbox')d=tasks.filter(t=>!t.date&&t.done);
  else if(currentTab==='today')d=tasks.filter(t=>t.date===todayStr()&&t.done);
  else if(currentTab==='upcoming')d=tasks.filter(t=>t.date&&t.date>todayStr()&&t.done);
  else d=tasks.filter(t=>t.done);
  const ids=new Set(d.map(t=>t.id));tasks=tasks.filter(t=>!ids.has(t.id));save();renderContent();
}
function addInboxTask(){const inp=document.getElementById('taskInput');const text=inp?inp.value.trim():'';if(!text)return;tasks.unshift({id:Date.now(),text,done:false,date:'',cat:'none',repeat:'none'});if(inp)inp.value='';save();renderContent();}
function startAddTask(){addingTask=true;renderContent();setTimeout(()=>{const i=document.getElementById('taskInput');if(i)i.focus();},50);}
function confirmAddTask(){
  const inp=document.getElementById('taskInput');const text=inp?inp.value.trim():'';if(!text)return;
  const date=(document.getElementById('newTaskDate')||{}).value||'';
  const cat=(document.getElementById('newTaskCat')||{}).value||'none';
  const repeat=(document.getElementById('newTaskRepeat')||{}).value||'none';
  tasks.unshift({id:Date.now(),text,done:false,date:date||(currentTab==='today'?todayStr():''),cat,repeat});
  addingTask=false;save();renderContent();
}
function toggleTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done){t.completedDate=todayStr();if(t.repeat&&t.repeat!=='none'&&t.date)tasks.push({id:Date.now(),text:t.text,done:false,date:nextDate(t.date,t.repeat),cat:t.cat,repeat:t.repeat});}
  else delete t.completedDate;
  save();renderContent();
}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderContent();}
function startEdit(id){editingId=id;schedulingId=null;renderContent();}
function saveEdit(id){const inp=document.getElementById(`edit-${id}`);if(!inp)return;const text=inp.value.trim();if(text){const t=tasks.find(t=>t.id===id);if(t)t.text=text;save();}editingId=null;renderContent();}
function handleEditKey(e,id){if(e.key==='Enter')saveEdit(id);if(e.key==='Escape'){editingId=null;renderContent();}}
function startSchedule(id){schedulingId=id;editingId=null;renderContent();setTimeout(()=>{const el=document.getElementById(`sched-date-${id}`);if(el)el.focus();},50);}
function applySchedule(id){
  const dateEl=document.getElementById(`sched-date-${id}`);
  if(!dateEl||!dateEl.value)return;
  const t=tasks.find(t=>t.id===id);
  if(t){t.date=dateEl.value;const ce=document.getElementById(`sched-cat-${id}`);const re=document.getElementById(`sched-rep-${id}`);if(ce)t.cat=ce.value;if(re)t.repeat=re.value;save();}
  schedulingId=null;renderContent();
}

if(!tasks.length){
  tasks=[
    {id:1,text:'comer um pastel de nata fresquinho ☕',done:false,date:todayStr(),cat:'life',repeat:'none'},
    {id:2,text:'passear junto ao oceano 🌊',done:false,date:todayStr(),cat:'health',repeat:'none'},
    {id:3,text:'ligar à melhor amiga 💛',done:false,date:'',cat:'life',repeat:'none'},
    {id:4,text:'comprar algo bonito para mim 🛍',done:false,date:'',cat:'fun',repeat:'none'},
    {id:5,text:'abraçar alguém querido 🤍',done:false,date:todayStr(),cat:'life',repeat:'none'},
    {id:6,text:'sentar em silêncio com um café ☕',done:false,date:'',cat:'life',repeat:'daily'},
    {id:7,text:'descobrir um novo percurso a pé 🗺',done:false,date:'',cat:'health',repeat:'none'},
    {id:8,text:'escrever algo bonito no diário ✍️',done:false,date:'',cat:'fun',repeat:'weekly'},
  ];
  save();
}
renderContent();
</script>
</body>
</html>
