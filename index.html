<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
:root{
  --cream:#FEF9F0;--blue:#2B5BA8;--blue-light:#5B84CC;--blue-pale:#D6E4F7;
  --green:#2D7A4F;--green-light:#E8F5EE;--red:#C41230;--gold:#D4A017;
  --caramel:#B07830;--ink:#1A1008;--muted:#8A7860;--white:#FFFFFF;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);
  display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh}

/* ── HEADER ── */
.header{position:relative;overflow:hidden;flex-shrink:0;background:#B8CED8}

/* Sky */
.sky{width:100%;height:130px;background:linear-gradient(180deg,#C8DCF0 0%,#DDE8F0 60%,#C0CCD4 100%);position:relative}

/* Clouds */
.cloud{position:absolute;background:white;border-radius:50%;opacity:0.82}

/* Serra da Estrela mountains SVG */
.mountains-svg{position:absolute;bottom:0;left:0;width:100%;display:block}

/* Snow road */
.header-overlay{position:relative;z-index:3;padding:14px 18px 0;display:flex;align-items:flex-start;justify-content:space-between}

.date-line{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#2B4060;opacity:.8;margin-bottom:3px}
.app-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#1A2A40;line-height:1;text-shadow:0 1px 3px rgba(255,255,255,.6)}
.app-title em{font-style:italic;font-weight:300;font-size:20px;display:block;color:#2B5BA8;margin-top:1px}

/* Rooster */
.rooster-wrap{flex-shrink:0;animation:bob 5s ease-in-out infinite;transform-origin:center bottom}
@keyframes bob{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

/* Nata row */
.nata-row{display:flex;align-items:center;gap:3px;margin-top:8px;height:26px}
.nata{font-size:19px;filter:grayscale(1) opacity(.2);transition:all .4s cubic-bezier(.34,1.56,.64,1);line-height:1}
.nata.on{filter:none;animation:nataIn .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes nataIn{0%{transform:scale(.3) rotate(-15deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

/* ── AZULEJO BAR ── */
.azulejo-bar{height:18px;background:#2B5BA8;flex-shrink:0;position:relative;overflow:hidden}

/* ── WAVES ── */
.waves{position:relative;height:42px;background:#4A9EC4;flex-shrink:0;overflow:hidden}
.wave{position:absolute;bottom:0;left:0;width:200%;height:100%}
.wave.w1{animation:waveMove 5s linear infinite;opacity:.9}
.wave.w2{animation:waveMove 7s linear infinite reverse;opacity:.45}
@keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.waves-label{position:absolute;top:7px;left:18px;font-size:9px;color:rgba(255,255,255,.65);letter-spacing:.18em;text-transform:uppercase;font-weight:700;z-index:2}
.boat{position:absolute;top:5px;right:20px;font-size:18px;z-index:2;animation:bob 3s ease-in-out infinite}

/* ── NATA BAR ── */
.nata-bar{background:#2E1503;padding:10px 18px;display:flex;align-items:center;gap:5px;border-bottom:3px solid var(--caramel);flex-shrink:0}
.nata-bar-label{font-size:9px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-right:2px;flex-shrink:0}
.natas{display:flex;gap:3px;flex:1}
.nata-count{font-size:10px;color:var(--gold);font-weight:700;flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;background:var(--cream)}

.section-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:14px 18px 5px;display:flex;align-items:center;justify-content:space-between}

.hide-done-btn{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--blue-pale);border-radius:12px;padding:3px 10px;color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.hide-done-btn:hover{background:var(--blue-pale)}
.hide-done-btn.active{background:var(--blue);color:white;border-color:var(--blue)}

.clear-done-btn{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid #f0c0c8;border-radius:12px;padding:3px 10px;color:var(--red);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;margin-left:6px}
.clear-done-btn:hover{background:#fae8ec}

/* ── ADD ROW ── */
.add-row{display:flex;align-items:center;gap:10px;padding:12px 18px;background:white;border-bottom:1px solid var(--blue-pale);border-top:1px solid var(--blue-pale);margin-bottom:2px}
.add-row input{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:15px;font-weight:400;color:var(--ink);outline:none}
.add-row input::placeholder{color:#C0AE90}
.add-btn{width:30px;height:30px;border:2px solid var(--blue);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:20px;line-height:1;transition:all .15s;flex-shrink:0}
.add-btn:hover{background:var(--blue);color:white}

.date-row{display:flex;align-items:center;gap:8px;padding:8px 18px 12px;background:white;border-bottom:1px solid var(--blue-pale);margin-bottom:2px}
.date-row label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.date-row input[type=date]{border:1px solid var(--blue-pale);border-radius:8px;padding:4px 10px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);outline:none;background:var(--cream);cursor:pointer}
.save-task-btn{margin-left:auto;background:var(--blue);color:white;border:none;border-radius:20px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.05em}

/* ── TASK ITEM ── */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;background:white;border-bottom:1px solid #EEE8D8;transition:opacity .2s;animation:taskIn .2s ease;position:relative}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue-light);opacity:0;transition:opacity .2s}
.task-item:hover::before{opacity:.4}
.task-item.done::before{background:var(--caramel);opacity:.5}
.task-item:nth-child(odd){background:#fdfaf3}
@keyframes taskIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.task-item.done{opacity:.45}

.check-box{width:20px;height:20px;border:2px solid var(--blue-light);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.task-item.done .check-box{background:var(--caramel);border-color:var(--caramel)}
.check-mark{color:white;font-size:11px;font-weight:700;opacity:0;transition:.15s}
.task-item.done .check-mark{opacity:1}

.task-body{flex:1;min-width:0}
.task-text{font-size:15px;line-height:1.45;cursor:pointer;word-break:break-word}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.task-date{font-size:10px;color:var(--blue-light);font-weight:600}
.task-date.overdue{color:var(--red)}
.task-date.today-badge{background:var(--green-light);color:var(--green);padding:1px 7px;border-radius:10px;font-weight:700}
.schedule-btn{background:none;border:1px solid var(--blue-pale);border-radius:12px;padding:2px 8px;font-size:10px;color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s}
.schedule-btn:hover{background:var(--blue-pale)}
.del-btn{background:none;border:none;color:#DDD;cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color .15s;flex-shrink:0}
.del-btn:hover{color:var(--red)}

.inline-date-picker{padding:8px 18px 12px 50px;background:white;border-bottom:1px solid #EEE8D8;display:flex;align-items:center;gap:8px;animation:taskIn .15s ease}
.inline-date-picker input[type=date]{border:1px solid var(--blue-pale);border-radius:8px;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);outline:none;background:var(--cream)}
.inline-date-picker button{background:var(--blue);color:white;border:none;border-radius:14px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.inline-date-picker .cancel-btn{background:#aaa}

.empty-state{text-align:center;padding:48px 28px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:10px;opacity:.5}
.empty-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px}

/* ── TAB BAR ── */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;border-top:1px solid var(--blue-pale);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 20px rgba(43,91,168,.08)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 4px 12px;background:none;border:none;cursor:pointer;color:var(--muted);transition:color .2s;font-family:'Nunito',sans-serif;position:relative}
.tab-icon{font-size:24px;line-height:1}
.tab-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tab-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red);color:white;font-size:8px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:15px;text-align:center}
.tab-btn.active{color:var(--blue)}
.tab-btn.active .tab-icon{transform:translateY(-2px)}
.hidden{display:none!important}
</style>
</head>

<div class="nata-bar">

</div>

<div class="content" id="contentArea"></div>

<!-- COPYRIGHT -->
<div style="text-align:center;padding:8px;font-size:10px;color:#b0a080;letter-spacing:.08em;font-family:'Nunito',sans-serif;opacity:.7">
  © 2026 Marina Martynova · Minhas Tarefas 🐓
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inbox',this)">
    <span class="tab-icon">📥</span>
    <span class="tab-label">Entrada</span>
    <span class="tab-badge hidden" id="badge-inbox">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('today',this)">
    <span class="tab-icon">☀️</span>
    <span class="tab-label">Hoje</span>
    <span class="tab-badge hidden" id="badge-today">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('upcoming',this)">
    <span class="tab-icon">📅</span>
    <span class="tab-label">Em breve</span>
    <span class="tab-badge hidden" id="badge-upcoming">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('all',this)">
    <span class="tab-icon">🗂</span>
    <span class="tab-label">Todas</span>
  </button>
</nav>

<script>
const APP_VERSION = 'v5';
if(localStorage.getItem('tarefas-version') !== APP_VERSION){
  localStorage.removeItem('tarefas-v4');
  localStorage.setItem('tarefas-version', APP_VERSION);
}
let tasks = JSON.parse(localStorage.getItem('tarefas-v4') || '[]');
let currentTab = 'inbox';
let schedulingId = null;
let addingTask = false;
let hideDone = false;

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function todayStr(){ return TODAY.toISOString().split('T')[0]; }

const days=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
document.getElementById('dateEl').textContent=`${days[TODAY.getDay()]}, ${TODAY.getDate()} de ${months[TODAY.getMonth()]}`;

function save(){ localStorage.setItem('tarefas-v4', JSON.stringify(tasks)); }

function fmtDate(str){
  const d=new Date(str+'T00:00:00');
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

// NATAS
function renderNatas(){
  const todayDone = tasks.filter(t=>t.done&&(t.date===todayStr()||t.completedDate===todayStr())).length;
  const count = Math.min(todayDone, 8);
  // header row
  const row = document.getElementById('nataRow');
  if(row){ row.innerHTML=''; for(let i=0;i<8;i++){ const n=document.createElement('span'); n.className='nata'+(i<count?' on':''); n.textContent='🥧'; row.appendChild(n); } }
  // bar row
  const bar = document.getElementById('nataBarRow');
  if(bar){ bar.innerHTML=''; for(let i=0;i<8;i++){ const n=document.createElement('span'); n.className='nata'+(i<count?' on':''); n.textContent='🥧'; bar.appendChild(n); } }
  const todayTotal = tasks.filter(t=>t.date===todayStr()||(t.done&&t.completedDate===todayStr())).length;
  const nc = document.getElementById('nataCount');
  if(nc) nc.textContent=`${todayDone}/${todayTotal}`;
}

// BADGES
function updateBadges(){
  const inbox=tasks.filter(t=>!t.date&&!t.done).length;
  const today=tasks.filter(t=>t.date===todayStr()&&!t.done).length;
  const upcoming=tasks.filter(t=>t.date&&t.date>todayStr()&&!t.done).length;
  setBadge('inbox',inbox); setBadge('today',today); setBadge('upcoming',upcoming);
}
function setBadge(id,n){ const el=document.getElementById('badge-'+id); if(!el)return; if(n>0){el.textContent=n;el.classList.remove('hidden');}else{el.classList.add('hidden');} }

// TABS
function switchTab(tab,btn){
  currentTab=tab; schedulingId=null; addingTask=false;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

// RENDER
function renderContent(){
  const area=document.getElementById('contentArea');
  let html='';

  const placeholders={inbox:'escreve aqui e pressiona Enter…',today:'adicionar para hoje…',upcoming:'nova tarefa…',all:'nova tarefa…'};
  const placeholder=placeholders[currentTab]||'nova tarefa…';
  const addAction = currentTab==='inbox' ? 'addInboxTask()' : 'startAddTask()';
  html+=`<div class="add-row"><input type="text" id="taskInput" placeholder="${placeholder}" maxlength="140"><button class="add-btn" onclick="${addAction}">+</button></div>`;

  if(addingTask){
    const defaultDate=currentTab==='today'?todayStr():'';
    html+=`<div class="date-row"><label>📅 data</label><input type="date" id="newTaskDate" value="${defaultDate}" min="${todayStr()}"><button class="save-task-btn" onclick="confirmAddTask()">Adicionar</button></div>`;
  }

  let visible=[];
  let label='';
  if(currentTab==='inbox'){ visible=tasks.filter(t=>!t.date); label='Entrada'; }
  else if(currentTab==='today'){ visible=tasks.filter(t=>t.date===todayStr()); label='Hoje'; }
  else if(currentTab==='upcoming'){ visible=tasks.filter(t=>t.date&&t.date>todayStr()); label='Em breve'; }
  else{ visible=[...tasks]; label='Todas as tarefas'; }

  const doneCount=visible.filter(t=>t.done).length;

  // Section label + controls
  html+=`<div class="section-label"><span>${label} · ${visible.length}</span><div>`;
  if(doneCount>0){
    html+=`<button class="hide-done-btn${hideDone?' active':''}" onclick="toggleHideDone()">${hideDone?'👁 mostrar':'🙈 ocultar'} concluídas</button>`;
    html+=`<button class="clear-done-btn" onclick="clearDone()">🗑 apagar</button>`;
  }
  html+=`</div></div>`;

  visible.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    if(a.date) return -1; if(b.date) return 1;
    return b.id-a.id;
  });

  if(hideDone) visible=visible.filter(t=>!t.done);

  if(!visible.length){
    const msgs={inbox:{icon:'📥',text:'Caixa vazia · escreve e pressiona Enter'},today:{icon:'☀️',text:'Tudo feito hoje · parabéns!'},upcoming:{icon:'🗓',text:'Sem tarefas futuras'},all:{icon:'🐓',text:'Sem tarefas'}};
    const e=msgs[currentTab]||msgs.all;
    html+=`<div class="empty-state"><div class="empty-icon">${e.icon}</div><div class="empty-text">${e.text}</div></div>`;
  } else {
    visible.forEach(t=>{
      const isScheduling=schedulingId===t.id;
      let dateBadge='';
      if(t.date){
        if(t.date===todayStr()) dateBadge=`<span class="task-date today-badge">hoje</span>`;
        else if(t.date<todayStr()) dateBadge=`<span class="task-date overdue">atrasado · ${fmtDate(t.date)}</span>`;
        else dateBadge=`<span class="task-date">${fmtDate(t.date)}</span>`;
      }
      const schedBtn=!t.date&&!t.done?`<button class="schedule-btn" onclick="startSchedule(${t.id})">📅 agendar</button>`:'';
      html+=`<div class="task-item${t.done?' done':''}" id="task-${t.id}">
        <div class="check-box" onclick="toggleTask(${t.id})"><span class="check-mark">✓</span></div>
        <div class="task-body">
          <div class="task-text" onclick="toggleTask(${t.id})">${t.text}</div>
          <div class="task-meta">${dateBadge}${schedBtn}</div>
        </div>
        <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
      </div>`;
      if(isScheduling){
        html+=`<div class="inline-date-picker">
          <input type="date" id="sched-date-${t.id}" value="${todayStr()}" min="${todayStr()}">
          <button onclick="applySchedule(${t.id})">✓ ok</button>
          <button class="cancel-btn" onclick="schedulingId=null;renderContent()">cancelar</button>
        </div>`;
      }
    });
  }

  area.innerHTML=html;
  const inp=document.getElementById('taskInput');
  if(inp) inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      const text=inp.value.trim();
      if(!text) return;
      if(currentTab==='inbox' && !addingTask){
        tasks.unshift({id:Date.now(),text,done:false,date:''});
        inp.value=''; save(); renderContent(); return;
      }
      if(addingTask) confirmAddTask(); else startAddTask();
    }
  });
  renderNatas();
  updateBadges();
}

function toggleHideDone(){ hideDone=!hideDone; renderContent(); }

function clearDone(){
  let visible=[];
  if(currentTab==='inbox') visible=tasks.filter(t=>!t.date&&t.done);
  else if(currentTab==='today') visible=tasks.filter(t=>t.date===todayStr()&&t.done);
  else if(currentTab==='upcoming') visible=tasks.filter(t=>t.date&&t.date>todayStr()&&t.done);
  else visible=tasks.filter(t=>t.done);
  const ids=new Set(visible.map(t=>t.id));
  tasks=tasks.filter(t=>!ids.has(t.id));
  save(); renderContent();
}

function addInboxTask(){ const inp=document.getElementById("taskInput"); const text=inp?inp.value.trim():""; if(!text) return; tasks.unshift({id:Date.now(),text,done:false,date:""}); if(inp) inp.value=""; save(); renderContent(); }
function startAddTask(){ addingTask=true; renderContent(); setTimeout(()=>{ const i=document.getElementById('taskInput'); if(i) i.focus(); },50); }
function confirmAddTask(){
  const inp=document.getElementById('taskInput'); const text=inp?inp.value.trim():''; if(!text) return;
  const dateEl=document.getElementById('newTaskDate'); const date=dateEl?dateEl.value:'';
  const finalDate=date||(currentTab==='today'?todayStr():'');
  tasks.unshift({id:Date.now(),text,done:false,date:finalDate});
  addingTask=false; save(); renderContent();
}
function toggleTask(id){ 
  const t=tasks.find(t=>t.id===id); 
  if(t){ 
    t.done=!t.done; 
    if(t.done) t.completedDate=todayStr();
    else delete t.completedDate;
    save(); renderContent(); 
  } 
}
function deleteTask(id){ tasks=tasks.filter(t=>t.id!==id); save(); renderContent(); }
function startSchedule(id){ schedulingId=id; renderContent(); setTimeout(()=>{ const el=document.getElementById(`sched-date-${id}`); if(el) el.focus(); },50); }
function applySchedule(id){ const el=document.getElementById(`sched-date-${id}`); if(!el||!el.value) return; const t=tasks.find(t=>t.id===id); if(t){t.date=el.value;save();} schedulingId=null; renderContent(); }

// INIT
if(!tasks.length){
  tasks=[
    {id:1,text:'comer um pastel de nata fresquinho ☕',done:false,date:todayStr()},
    {id:2,text:'passear junto ao oceano 🌊',done:false,date:todayStr()},
    {id:3,text:'ligar à melhor amiga 💛',done:false,date:''},
    {id:4,text:'comprar algo bonito para mim 🛍',done:false,date:''},
    {id:5,text:'abraçar alguém querido 🤍',done:false,date:todayStr()},
    {id:6,text:'sentar em silêncio com um café ☕',done:false,date:''},
    {id:7,text:'descobrir um novo percurso a pé 🗺',done:false,date:''},
    {id:8,text:'escrever algo bonito no diário ✍️',done:false,date:''},
  ];
  save();
}
renderContent();
</script>
</body>
